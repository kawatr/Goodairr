version: "3.9"

services:

  # ----------------------------------------------------------
  #  PostgreSQL – base de données GoodAir
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: goodair_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  #  ETL Python – collecte toutes les heures
  # ----------------------------------------------------------
  etl:
    build: ./etl
    container_name: goodair_etl
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./etl:/app
    environment:
      POSTGRES_HOST: postgres

volumes:
  pgdata:
    driver: local